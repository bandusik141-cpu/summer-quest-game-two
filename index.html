<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пляжный Бар: Мастер Коктейлей</title>
    <style>
        :root {
            --ocean-blue: #00b4d8;
            --sunset-orange: #ff9e00;
            --sand-yellow: #ffea00;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            background: linear-gradient(180deg, #00b4d8 0%, #90e0ef 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #0077b6;
        }

        #game-card {
            background: rgba(255, 255, 255, 0.95);
            width: min(90%, 450px);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
            border: 5px solid white;
        }

        h1 { color: #023e8a; margin-top: 0; font-size: 2rem; }
        p { color: #0077b6; font-weight: bold; }

        .screen { display: none; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .active { display: block; }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .btn {
            background: var(--sunset-orange);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            box-shadow: 0 5px 0 #cc7e00;
            width: 100%;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #cc7e00; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #cc7e00; }

        /* ===== RECIPE VIEW ===== */
        .recipe-box {
            background: #caf0f8;
            padding: 15px;
            border-radius: 20px;
            margin: 20px 0;
        }

        .recipe-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: white;
            margin: 5px 0;
            border-radius: 12px;
            font-size: 1.1rem;
        }

        .icon { width: 40px; height: 40px; object-fit: contain; }

        /* ===== GAMEPLAY VIEW ===== */
        .ingredients-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .ingredient-btn {
            background: white;
            border: 3px solid #caf0f8;
            padding: 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .ingredient-btn:hover { border-color: var(--ocean-blue); }

        .counter {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4d6d;
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
        }

        #timer-bar {
            width: 100%;
            height: 12px;
            background: #caf0f8;
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        #timer-fill {
            height: 100%;
            background: #ff4d6d;
            width: 100%;
            transition: width 0.1s linear;
        }

        /* ===== RESULT ===== */
        .result-icon { width: 120px; margin: 20px 0; }
        .next-btn { background: #2ecc71; box-shadow: 0 5px 0 #27ae60; }
        .next-btn:hover { box-shadow: 0 7px 0 #27ae60; }
    </style>
</head>
<body>

<div id="game-card">
    <!-- START SCREEN -->
    <div id="start-screen" class="screen active">
        <img src="https://img.icons8.com/fluency/96/cocktail.png" alt="bar">
        <h1>Пляжный Бар</h1>
        <p>Запомни рецепт и приготовь идеальный летний коктейль!</p>
        <button class="btn" onclick="startRecipe()">Начать!</button>
    </div>

    <!-- RECIPE SCREEN -->
    <div id="recipe-screen" class="screen">
        <h2>Твой заказ:</h2>
        <div id="cocktail-name" style="font-size: 1.4rem; color: #023e8a; margin-bottom: 10px;"></div>
        <div id="recipe-list" class="recipe-box"></div>
        <div id="memo-timer" style="font-size: 2rem; font-weight: bold; color: #ff4d6d;">5</div>
    </div>

    <!-- PLAY SCREEN -->
    <div id="play-screen" class="screen">
        <h2>Смешивай!</h2>
        <div class="ingredients-grid" id="ingredients-grid"></div>
        <div id="timer-bar"><div id="timer-fill"></div></div>
        <button class="btn" onclick="checkResult()">Готово!</button>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="screen">
        <h2 id="result-title"></h2>
        <p id="result-text"></p>
        <img id="result-img" class="result-icon" src="">
        <button id="next-btn" class="btn next-btn" style="display: none;" onclick="goToNextGame()">Идти дальше ➔</button>
        <button id="retry-btn" class="btn" style="display: none;" onclick="location.reload()">Попробовать снова</button>
    </div>
</div>

<script>
    // --- НАСТРОЙКИ ---
    const CONFIG = {
        cocktail: "Тропический бриз",
        nextGameUrl: "ССЫЛКА_НА_ИГРУ_3", // ВСТАВЬ СЮДА ССЫЛКУ НА 3-Ю ИГРУ
        recipe: [
            { id: 'ice', name: 'Лед', count: 3, img: 'https://img.icons8.com/fluency/96/ice-cube.png' },
            { id: 'lemon', name: 'Лимон', count: 2, img: 'https://img.icons8.com/fluency/96/lemon.png' },
            { id: 'mint', name: 'Мята', count: 4, img: 'https://img.icons8.com/fluency/96/mint.png' },
            { id: 'umbrella', name: 'Зонтик', count: 1, img: 'https://img.icons8.com/fluency/96/beach-umbrella.png' }
        ],
        memoTime: 6,
        playTime: 12
    };

    let userSelection = {};
    let timerInterval;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startRecipe() {
        showScreen('recipe-screen');
        document.getElementById('cocktail-name').innerText = CONFIG.cocktail;
        const list = document.getElementById('recipe-list');
        list.innerHTML = '';
        
        CONFIG.recipe.forEach(item => {
            const div = document.createElement('div');
            div.className = 'recipe-item';
            div.innerHTML = `<span>${item.name}</span> <span>x ${item.count}</span>`;
            list.appendChild(div);
        });

        let timeLeft = CONFIG.memoTime;
        const timerDisplay = document.getElementById('memo-timer');
        const interval = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(interval);
                startPlay();
            }
        }, 1000);
    }

    function startPlay() {
        showScreen('play-screen');
        const grid = document.getElementById('ingredients-grid');
        grid.innerHTML = '';
        
        CONFIG.recipe.forEach(item => {
            userSelection[item.id] = 0;
            const btn = document.createElement('div');
            btn.className = 'ingredient-btn';
            btn.innerHTML = `
                <img src="${item.img}" class="icon">
                <span style="font-size: 0.8rem; margin-top: 5px;">${item.name}</span>
                <div class="counter" id="count-${item.id}">0</div>
            `;
            btn.onclick = () => {
                userSelection[item.id]++;
                document.getElementById(`count-${item.id}`).innerText = userSelection[item.id];
            };
            grid.appendChild(btn);
        });

        let timeLeft = CONFIG.playTime * 10;
        const totalTime = CONFIG.playTime * 10;
        const fill = document.getElementById('timer-fill');
        
        timerInterval = setInterval(() => {
            timeLeft--;
            fill.style.width = (timeLeft / totalTime * 100) + '%';
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                checkResult();
            }
        }, 100);
    }

    function checkResult() {
        clearInterval(timerInterval);
        showScreen('result-screen');
        
        let isCorrect = true;
        CONFIG.recipe.forEach(item => {
            if (userSelection[item.id] !== item.count) isCorrect = false;
        });

        const title = document.getElementById('result-title');
        const text = document.getElementById('result-text');
        const img = document.getElementById('result-img');
        const nextBtn = document.getElementById('next-btn');
        const retryBtn = document.getElementById('retry-btn');

        if (isCorrect) {
            title.innerText = "Идеально! ✨";
            title.style.color = "#2ecc71";
            text.innerText = "Ты настоящий мастер! Твой путь продолжается.";
            img.src = "https://img.icons8.com/fluency/144/checked-checkbox.png";
            nextBtn.style.display = "block";
            retryBtn.style.display = "none";
        } else {
            title.innerText = "Ой... 🤢";
            title.style.color = "#ff4d6d";
            text.innerText = "Коктейль получился странным. Попробуй еще раз!";
            img.src = "https://img.icons8.com/fluency/144/cancel.png";
            nextBtn.style.display = "none";
            retryBtn.style.display = "block";
        }
    }

    function goToNextGame() {
        if (CONFIG.nextGameUrl === "ССЫЛКА_НА_ИГРУ_3") {
            alert("Пожалуйста, вставь ссылку на 3-ю игру в коде (переменная nextGameUrl)");
        } else {
            window.location.href = CONFIG.nextGameUrl;
        }
    }
</script>

</body>
</html>
